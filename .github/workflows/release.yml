name: Release

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: "Release mode"
        type: choice
        required: true
        default: first
        options:
          - first
          - bump
      bump:
        description: "Version bump (used only when release_mode=bump)"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      create_github_release:
        description: "Create GitHub Release + mark latest"
        type: boolean
        required: true
        default: true

permissions:
  contents: write

jobs:
  release:
    uses: Dev-kitx/.github/.github/workflows/vscode-extension-release.yml@main
    secrets: inherit
    with:
      release_mode: ${{ inputs.release_mode }}
      bump: ${{ inputs.bump }}
      create_github_release: ${{ inputs.create_github_release }}
      